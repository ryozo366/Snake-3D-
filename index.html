function getSkinColor(segIdx, totalSegs, time) {
  const skin = SKIN_DEFS.find(s => s.id === currentSkin) || SKIN_DEFS[0];
  if (skin.type === 'rainbow') {
    const hue = ((segIdx / Math.max(totalSegs, 1)) * 360 + time * 50) % 360;
    return new THREE.Color().setHSL(hue / 360, 0.85, 0.55);
  }
  if (skin.type === 'gradient' && skin.colors) {
    const t = segIdx / Math.max(totalSegs - 1, 1);
    const c1idx = Math.min(Math.floor(t * (skin.colors.length - 1)), skin.colors.length - 2);
    const c2idx = c1idx + 1;
    const lt = (t * (skin.colors.length - 1)) - c1idx;
    const c = new THREE.Color(skin.colors[c1idx]).lerp(new THREE.Color(skin.colors[c2idx]), lt);
    return c;
  }
  return new THREE.Color(skin.color || 0x4285f4);
}

function createMapPreviewDataURL(mapId) {

  // Dirt path
  ctx.fillStyle = '#' + new THREE.Color(theme.dirtColor).getHexString();
  ctx.fillRect(15, 22, 50, 14);
  // Grass checkerboard
  for (let y = 0; y < 8; y++) {
    for (let x = 0; x < 12; x++) {
      ctx.fillStyle = (x + y) % 2 === 0 ? theme.grassLight : theme.grassDark;
      ctx.fillRect(20 + x * 3, 24 + y * 1.2, 3, 1.2);

  }
  // Fence
  ctx.fillStyle = '#' + new THREE.Color(theme.fenceColor).getHexString();
  ctx.fillRect(19, 23, 42, 1); ctx.fillRect(19, 35, 42, 1);
  ctx.fillRect(19, 23, 1, 13); ctx.fillRect(60, 23, 1, 13);
  // Trees
  const treeCol = '#' + new THREE.Color(theme.treeColors[0]).getHexString();
  const trunkCol = '#' + new THREE.Color(theme.trunkColor || 0x6b4226).getHexString();

    ctx.fillStyle = treeCol;
    ctx.beginPath(); ctx.arc(tx + 0.5, ty, 2, 0, Math.PI * 2); ctx.fill();
  }
  return c.toDataURL();
}

// Generate a small canvas preview for a skin
function createSkinPreviewDataURL(skin) {
  const c = document.createElement('canvas');
  c.width = 100; c.height = 24;
  const ctx = c.getContext('2d');
  const segs = 8;
  const segW = c.width / segs;
  for (let i = 0; i < segs; i++) {
    let col;
    if (skin.type === 'rainbow') {
      const hue = (i / segs) * 360;
      col = `hsl(${hue}, 85%, 55%)`;
    } else if (skin.type === 'gradient' && skin.colors) {
      const t = i / (segs - 1);
      const c1i = Math.min(Math.floor(t * (skin.colors.length - 1)), skin.colors.length - 2);
      const c2i = c1i + 1;
      const lt = (t * (skin.colors.length - 1)) - c1i;
      const color = new THREE.Color(skin.colors[c1i]).lerp(new THREE.Color(skin.colors[c2i]), lt);
      col = '#' + color.getHexString();
    } else {
      col = '#' + new THREE.Color(skin.color || 0x4285f4).getHexString();
    }
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(segW * i + segW / 2, 12, segW / 2 - 1, 0, Math.PI * 2);
    ctx.fill();
  }
  return c.toDataURL();
}

let envMeshes = []; // track all environment meshes for cleanup

function clearEnvironment() {
  for (const m of envMeshes) {
    scene.remove(m);
    if (m.geometry) m.geometry.dispose();
    if (m.material) {
      if (Array.isArray(m.material)) m.material.forEach(mt => mt.dispose());
      else m.material.dispose();
    }
  }
  envMeshes = [];
}

function createCheckerboardTexture(colorA, colorB) {
  const size = COLS;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      ctx.fillStyle = (x + y) % 2 === 0 ? colorA : colorB;
      ctx.fillRect(x, y, 1, 1);
    }
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}

function addEnv(mesh) {
  scene.add(mesh);
  envMeshes.push(mesh);
  return mesh;
}

function addEnvGroup(group) {
  scene.add(group);
  envMeshes.push(group);
  return group;
}

function randomSide(offset, spread) {
  const side = Math.floor(Math.random() * 4);
  const along = (Math.random() - 0.5) * spread;
  let x, z;
  if (side === 0) { x = along; z = -HALF - offset; }
  else if (side === 1) { x = along; z = HALF + offset; }
  else if (side === 2) { x = -HALF - offset; z = along; }
  else { x = HALF + offset; z = along; }
  return { x, z };
}

function randomOutside(minDist, maxDist) {
  const angle = Math.random() * Math.PI * 2;
  const dist = minDist + Math.random() * (maxDist - minDist);
  return { x: Math.cos(angle) * dist, z: Math.sin(angle) * dist };
}

    new THREE.PlaneGeometry(COLS + 12, ROWS + 12),
    new THREE.MeshStandardMaterial({ color: theme.dirtColor, roughness: 0.9 })
  ));

    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshStandardMaterial({ color: theme.farColor, roughness: 0.9 })
  ));

  buildFence(theme);

  const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 1.0, 6);
  const topGeo = new THREE.SphereGeometry(0.7, 8, 6);
  const trunkMat = new THREE.MeshStandardMaterial({ color: theme.trunkColor, roughness: 0.9 });
  for (let i = 0; i < 200; i++) {
    const p = randomSide(1.5 + Math.random() * 20, COLS + 40);
    const g = new THREE.Group();
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = 0.5; trunk.castShadow = true; g.add(trunk);
    const topMat = new THREE.MeshStandardMaterial({ color: theme.treeColors[Math.floor(Math.random() * 3)], roughness: 0.7 });
    const top = new THREE.Mesh(topGeo, topMat);
    const s = 0.8 + Math.random() * 0.5;
    top.scale.set(s, s * (0.8 + Math.random() * 0.4), s);
    top.position.y = 1.3 + Math.random() * 0.3; top.castShadow = true; g.add(top);
    g.position.set(p.x, 0, p.z);
    addEnvGroup(g);
  }

  // Flowers/bushes (120)
  const flowerGeo = new THREE.SphereGeometry(0.1, 6, 4);
  const bushGeo = new THREE.SphereGeometry(0.25, 6, 5);
  for (let i = 0; i < 120; i++) {
    const p = randomSide(0.6 + Math.random() * 12, COLS + 25);
    if (Math.random() < 0.5) {
      const fc = theme.flowerColors[Math.floor(Math.random() * theme.flowerColors.length)];
      const f = addEnv(new THREE.Mesh(flowerGeo, new THREE.MeshStandardMaterial({ color: fc })));
      f.position.set(p.x, 0.1, p.z);
    } else {
      const b = addEnv(new THREE.Mesh(bushGeo, new THREE.MeshStandardMaterial({ color: theme.bushColor, roughness: 0.8 })));
      b.position.set(p.x, 0.15, p.z);
      b.scale.set(0.6 + Math.random() * 0.6, 0.5 + Math.random() * 0.4, 0.6 + Math.random() * 0.6);
    }
  }

  // Rocks (50)
  const rockGeo = new THREE.DodecahedronGeometry(0.18, 0);
  for (let i = 0; i < 50; i++) {
    const p = randomOutside(HALF + 1.5, HALF + 20);
    const rock = addEnv(new THREE.Mesh(rockGeo, new THREE.MeshStandardMaterial({ color: theme.rockColor, roughness: 0.9 })));
    rock.position.set(p.x, 0.1, p.z);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    rock.scale.setScalar(0.5 + Math.random() * 0.8);
  }

  // Ponds (10)
  for (let i = 0; i < 10; i++) {
    const p = randomOutside(HALF + 2, HALF + 18);
    const pond = addEnv(new THREE.Mesh(
      new THREE.CircleGeometry(0.5 + Math.random() * 0.8, 16),
      new THREE.MeshStandardMaterial({ color: 0x4488cc, transparent: true, opacity: 0.6, roughness: 0.1 })
    ));
    pond.rotation.x = -Math.PI / 2; pond.position.set(p.x, 0.01, p.z);
  }

  // Mushrooms (30)
  for (let i = 0; i < 30; i++) {
    const p = randomSide(1.0 + Math.random() * 10, COLS + 20);
    const g = new THREE.Group();
    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.05, 0.15, 6),
      new THREE.MeshStandardMaterial({ color: 0xf5f0e0 })
    );
    stem.position.y = 0.075; g.add(stem);
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 8, 6),
      new THREE.MeshStandardMaterial({ color: Math.random() < 0.5 ? 0xff4444 : 0xdd8833 })
    );
    cap.scale.set(1, 0.5, 1); cap.position.y = 0.16; g.add(cap);
    g.position.set(p.x, 0, p.z);
    addEnvGroup(g);
  }
}

// ===== WINTER / FROZEN TUNDRA =====
function buildWinter(theme) {
  // Ground
  const ground = addEnv(new THREE.Mesh(
    new THREE.PlaneGeometry(COLS, ROWS),
    new THREE.MeshStandardMaterial({ map: createCheckerboardTexture(theme.grassLight, theme.grassDark), roughness: 0.85 })
  ));
  ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;

  const outerGround = addEnv(new THREE.Mesh(
    new THREE.PlaneGeometry(COLS + 12, ROWS + 12),
    new THREE.MeshStandardMaterial({ color: theme.dirtColor, roughness: 0.9 })
  ));
  outerGround.rotation.x = -Math.PI / 2; outerGround.position.y = -0.01; outerGround.receiveShadow = true;

  const farGround = addEnv(new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshStandardMaterial({ color: theme.farColor, roughness: 0.9 })
  ));
  farGround.rotation.x = -Math.PI / 2; farGround.position.y = -0.02;

  buildFence(theme);

  // Evergreen trees (180) — cones with snow caps, spread far
  for (let i = 0; i < 180; i++) {
    const p = randomSide(1.5 + Math.random() * 20, COLS + 40);
    const g = new THREE.Group();
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.12, 0.6, 6),
      new THREE.MeshStandardMaterial({ color: theme.trunkColor, roughness: 0.9 })
    );
    trunk.position.y = 0.3; trunk.castShadow = true; g.add(trunk);

    const h = 1.0 + Math.random() * 0.8;
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(0.5 + Math.random() * 0.3, h, 8),
      new THREE.MeshStandardMaterial({ color: theme.treeColors[Math.floor(Math.random() * 3)], roughness: 0.7 })
    );
    cone.position.y = 0.6 + h / 2; cone.castShadow = true; g.add(cone);

    // Snow cap
    const snowCap = new THREE.Mesh(
      new THREE.ConeGeometry(0.3, 0.25, 8),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 })
    );
    snowCap.position.y = 0.6 + h + 0.05; g.add(snowCap);

    g.position.set(p.x, 0, p.z);
    addEnvGroup(g);
  }

  // Ice patches (40)
  for (let i = 0; i < 40; i++) {
    const p = randomOutside(HALF + 0.5, HALF + 20);
    const ice = addEnv(new THREE.Mesh(
      new THREE.CircleGeometry(0.3 + Math.random() * 0.6, 12),
      new THREE.MeshStandardMaterial({ color: 0x88bbee, transparent: true, opacity: 0.5, roughness: 0.05, metalness: 0.3 })
    ));
    ice.rotation.x = -Math.PI / 2; ice.position.set(p.x, 0.01, p.z);
  }

  // Snowmen (3)
  const snowmenPos = [
    { x: -HALF - 3, z: -HALF - 3 },
    { x: HALF + 4, z: 2 },
    { x: 0, z: HALF + 4 },
  ];
  for (const sp of snowmenPos) {
    const g = new THREE.Group();
    const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
    const bottom = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 10), whiteMat);
    bottom.position.y = 0.45; g.add(bottom);
    const mid = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 10), whiteMat);
    mid.position.y = 1.1; g.add(mid);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 12, 10), whiteMat);
    head.position.y = 1.6; g.add(head);
    // Nose
    const nose = new THREE.Mesh(
      new THREE.ConeGeometry(0.05, 0.25, 6),
      new THREE.MeshStandardMaterial({ color: 0xff8800 })
    );
    nose.rotation.x = -Math.PI / 2; nose.position.set(0, 1.6, 0.25); g.add(nose);
    // Eyes
    for (const side of [-1, 1]) {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), new THREE.MeshStandardMaterial({ color: 0x222222 }));
      eye.position.set(side * 0.08, 1.7, 0.2); g.add(eye);
    }
    g.position.set(sp.x, 0, sp.z);
    addEnvGroup(g);
  }

  // Snow rocks (40)
  const rockGeo = new THREE.DodecahedronGeometry(0.2, 0);
  for (let i = 0; i < 40; i++) {
    const p = randomOutside(HALF + 1.5, HALF + 18);
    const g = new THREE.Group();
    const rock = new THREE.Mesh(rockGeo, new THREE.MeshStandardMaterial({ color: theme.rockColor, roughness: 0.9 }));
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    rock.scale.setScalar(0.5 + Math.random() * 0.8);
    g.add(rock);
    // Snow on top
    const snowTop = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 6, 4),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    snowTop.scale.set(1.2, 0.4, 1.2); snowTop.position.y = 0.12; g.add(snowTop);
    g.position.set(p.x, 0.1, p.z);
    addEnvGroup(g);
  }

  // Frozen lake
  const lake = addEnv(new THREE.Mesh(
    new THREE.CircleGeometry(3, 24),
    new THREE.MeshStandardMaterial({ color: 0x88bbee, transparent: true, opacity: 0.65, roughness: 0.02, metalness: 0.5 })
  ));
  lake.rotation.x = -Math.PI / 2; lake.position.set(HALF + 5, 0.02, -HALF - 4);

  // ICE CASTLE — main landmark
  const castleGroup = new THREE.Group();
  const castleMat = new THREE.MeshStandardMaterial({ color: 0xaaccee, roughness: 0.2, metalness: 0.3 });
  const castleDarkMat = new THREE.MeshStandardMaterial({ color: 0x88aacc, roughness: 0.3, metalness: 0.2 });

  // Main body
  const castleBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2.5), castleMat);
  castleBody.position.y = 1.25; castleBody.castShadow = true; castleGroup.add(castleBody);

  // Four towers
  for (const cx of [-1.2, 1.2]) {
    for (const cz of [-1.2, 1.2]) {
      const tower = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.45, 3.5, 8), castleDarkMat);
      tower.position.set(cx, 1.75, cz); tower.castShadow = true; castleGroup.add(tower);
      const roof = new THREE.Mesh(new THREE.ConeGeometry(0.55, 0.8, 8), new THREE.MeshStandardMaterial({ color: 0x6688aa }));
      roof.position.set(cx, 3.7, cz); castleGroup.add(roof);
    }
  }

  // Center tower
  const cTower = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.55, 4.5, 8), castleMat);
  cTower.position.y = 2.25; cTower.castShadow = true; castleGroup.add(cTower);
  const cRoof = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.0, 8), new THREE.MeshStandardMaterial({ color: 0x5577aa }));
  cRoof.position.y = 4.75; castleGroup.add(cRoof);

  castleGroup.position.set(-HALF - 8, 0, 0);
  addEnvGroup(castleGroup);
}

// ===== JUNGLE RUINS =====
function buildJungle(theme) {
  // Ground
  const ground = addEnv(new THREE.Mesh(
    new THREE.PlaneGeometry(COLS, ROWS),
    new THREE.MeshStandardMaterial({ map: createCheckerboardTexture(theme.grassLight, theme.grassDark), roughness: 0.85 })
  ));
  ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;

  const outerGround = addEnv(new THREE.Mesh(
    new THREE.PlaneGeometry(COLS + 12, ROWS + 12),
    new THREE.MeshStandardMaterial({ color: theme.dirtColor, roughness: 0.9 })
  ));
  outerGround.rotation.x = -Math.PI / 2; outerGround.position.y = -0.01; outerGround.receiveShadow = true;

  const farGround = addEnv(new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshStandardMaterial({ color: theme.farColor, roughness: 0.9 })
  ));
  farGround.rotation.x = -Math.PI / 2; farGround.position.y = -0.02;

  buildFence(theme);

  // Palm trees (160) — spread far
  for (let i = 0; i < 160; i++) {
    const p = randomSide(1.5 + Math.random() * 20, COLS + 40);
    const g = new THREE.Group();
    const h = 1.5 + Math.random() * 1.5;
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.14, h, 8),
      new THREE.MeshStandardMaterial({ color: theme.trunkColor, roughness: 0.9 })
    );
    trunk.position.y = h / 2;
    // Slight tilt
    trunk.rotation.z = (Math.random() - 0.5) * 0.2;
    trunk.castShadow = true; g.add(trunk);

    // Fronds (leaf clusters)
    for (let j = 0; j < 5; j++) {
      const frond = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 6, 4),
        new THREE.MeshStandardMaterial({ color: theme.treeColors[Math.floor(Math.random() * 3)], roughness: 0.6 })
      );
      frond.scale.set(1.5, 0.3, 0.6);
      frond.position.y = h + 0.1;
      frond.rotation.y = (j / 5) * Math.PI * 2;
      frond.rotation.z = -0.4;
      g.add(frond);
    }

    g.position.set(p.x, 0, p.z);
    addEnvGroup(g);
  }

  // Dense undergrowth bushes (150)
  const bushGeo = new THREE.SphereGeometry(0.3, 6, 5);
  for (let i = 0; i < 150; i++) {
    const p = randomSide(0.6 + Math.random() * 15, COLS + 30);
    const b = addEnv(new THREE.Mesh(bushGeo, new THREE.MeshStandardMaterial({ color: theme.bushColor, roughness: 0.8 })));
    b.position.set(p.x, 0.12, p.z);
    b.scale.set(0.5 + Math.random() * 0.8, 0.4 + Math.random() * 0.5, 0.5 + Math.random() * 0.8);
  }

  // Tropical flowers (80)
  const flowerGeo = new THREE.SphereGeometry(0.12, 6, 4);
  for (let i = 0; i < 80; i++) {
    const p = randomSide(0.5 + Math.random() * 10, COLS + 20);
    const fc = theme.flowerColors[Math.floor(Math.random() * theme.flowerColors.length)];
    const f = addEnv(new THREE.Mesh(flowerGeo, new THREE.MeshStandardMaterial({ color: fc, emissive: fc, emissiveIntensity: 0.2 })));
    f.position.set(p.x, 0.12, p.z);
  }

  // Vines (green cylinders hanging from some trees) — 20
  for (let i = 0; i < 20; i++) {
    const p = randomSide(2 + Math.random() * 3, COLS + 6);
    const vineLen = 0.5 + Math.random() * 1.0;
    const vine = addEnv(new THREE.Mesh(
      new THREE.CylinderGeometry(0.02, 0.02, vineLen, 4),
      new THREE.MeshStandardMaterial({ color: 0x2a7020 })
    ));
    vine.position.set(p.x, vineLen / 2 + 1.0, p.z);
  }

  // Stone pillars (12)
  for (let i = 0; i < 12; i++) {
    const p = randomOutside(HALF + 2, HALF + 7);
    const ph = 0.3 + Math.random() * 0.6;
    const pillar = addEnv(new THREE.Mesh(
      new THREE.CylinderGeometry(0.15, 0.18, ph, 6),
      new THREE.MeshStandardMaterial({ color: 0x8A8A70, roughness: 0.95 })
    ));
    pillar.position.set(p.x, ph / 2, p.z);
    pillar.rotation.set((Math.random() - 0.5) * 0.3, 0, (Math.random() - 0.5) * 0.3);
  }

  // JUNGLE TEMPLE — main landmark (stepped pyramid)
  const templeGroup = new THREE.Group();
  const stoneMat = new THREE.MeshStandardMaterial({ color: 0x7A8A68, roughness: 0.95 });
  const mossyMat = new THREE.MeshStandardMaterial({ color: 0x5A7A48, roughness: 0.9 });
  const steps = [
    { w: 4, h: 1.0, d: 4 },
    { w: 3, h: 0.9, d: 3 },
    { w: 2.2, h: 0.8, d: 2.2 },
    { w: 1.5, h: 0.7, d: 1.5 },
  ];
  let yOff = 0;
  for (let si = 0; si < steps.length; si++) {
    const st = steps[si];
    const mat = si % 2 === 0 ? stoneMat : mossyMat;
    const block = new THREE.Mesh(new THREE.BoxGeometry(st.w, st.h, st.d), mat);
    block.position.y = yOff + st.h / 2; block.castShadow = true;
    templeGroup.add(block);
    yOff += st.h;
  }
  // Temple top piece
  const topPiece = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 1.0, 0.8),
    new THREE.MeshStandardMaterial({ color: 0x6A7A58, roughness: 0.9 })
  );
  topPiece.position.y = yOff + 0.5; topPiece.castShadow = true; templeGroup.add(topPiece);

  templeGroup.position.set(HALF + 7, 0, -HALF - 5);
  addEnvGroup(templeGroup);

  // Rocks
  const rockGeo = new THREE.DodecahedronGeometry(0.2, 0);
  for (let i = 0; i < 20; i++) {
    const p = randomOutside(HALF + 1.5, HALF + 6);
    const rock = addEnv(new THREE.Mesh(rockGeo, new THREE.MeshStandardMaterial({ color: theme.rockColor, roughness: 0.9 })));
    rock.position.set(p.x, 0.1, p.z);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    rock.scale.setScalar(0.5 + Math.random() * 0.8);
  }
}

// ===== DESERT SANDS =====
function buildDesert(theme) {
  // Ground
  const ground = addEnv(new THREE.Mesh(
    new THREE.PlaneGeometry(COLS, ROWS),
    new THREE.MeshStandardMaterial({ map: createCheckerboardTexture(theme.grassLight, theme.grassDark), roughness: 0.85 })
  ));
  ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;

  const outerGround = addEnv(new THREE.Mesh(
    new THREE.PlaneGeometry(COLS + 12, ROWS + 12),
    new THREE.MeshStandardMaterial({ color: theme.dirtColor, roughness: 0.9 })
  ));
  outerGround.rotation.x = -Math.PI / 2; outerGround.position.y = -0.01; outerGround.receiveShadow = true;

  const farGround = addEnv(new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshStandardMaterial({ color: theme.farColor, roughness: 0.9 })
  ));
  farGround.rotation.x = -Math.PI / 2; farGround.position.y = -0.02;

  buildFence(theme);

  // Cacti (120) — spread far
  for (let i = 0; i < 120; i++) {
    const p = randomSide(1.5 + Math.random() * 20, COLS + 40);
    const g = new THREE.Group();
    const cactusMat = new THREE.MeshStandardMaterial({ color: theme.treeColors[Math.floor(Math.random() * 3)], roughness: 0.7 });
    const h = 0.6 + Math.random() * 1.0;
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, h, 8), cactusMat);
    body.position.y = h / 2; body.castShadow = true; g.add(body);

    // Arms (0-2)
    const arms = Math.floor(Math.random() * 3);
    for (let a = 0; a < arms; a++) {
      const armH = 0.2 + Math.random() * 0.3;
      const armUp = 0.15 + Math.random() * 0.15;
      const armAngle = Math.random() * Math.PI * 2;
      const armGroup = new THREE.Group();
      // horizontal part
      const hz = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.2, 6), cactusMat);
      hz.rotation.z = Math.PI / 2; hz.position.x = 0.1; armGroup.add(hz);
      // vertical part
      const vt = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, armH, 6), cactusMat);
      vt.position.set(0.2, armH / 2, 0); armGroup.add(vt);
      armGroup.position.y = h * 0.4 + armUp;
      armGroup.rotation.y = armAngle;
      g.add(armGroup);
    }

    g.position.set(p.x, 0, p.z);
    addEnvGroup(g);
  }

  // Sand dunes (60)
  for (let i = 0; i < 60; i++) {
    const p = randomOutside(HALF + 2, HALF + 25);
    const dune = addEnv(new THREE.Mesh(
      new THREE.SphereGeometry(0.8 + Math.random() * 1.5, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0xD8C080, roughness: 0.95 })
    ));
    dune.scale.set(1.5 + Math.random(), 0.15 + Math.random() * 0.1, 1.2 + Math.random());
    dune.position.set(p.x, -0.1, p.z);
  }

  // Desert rocks (40)
  const rockGeo = new THREE.DodecahedronGeometry(0.22, 0);
  for (let i = 0; i < 40; i++) {
    const p = randomOutside(HALF + 1.5, HALF + 18);
    const rock = addEnv(new THREE.Mesh(rockGeo, new THREE.MeshStandardMaterial({ color: theme.rockColor, roughness: 0.9 })));
    rock.position.set(p.x, 0.1, p.z);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    rock.scale.setScalar(0.5 + Math.random() * 0.8);
  }

  // PYRAMIDS — main landmark
  const pyramidGroup = new THREE.Group();
  const sandMat = new THREE.MeshStandardMaterial({ color: 0xDAB866, roughness: 0.8 });
  const darkSandMat = new THREE.MeshStandardMaterial({ color: 0xC4A050, roughness: 0.85 });

  // Large pyramid
  const bigPyramid = new THREE.Mesh(new THREE.ConeGeometry(3.5, 5, 4), sandMat);
  bigPyramid.position.set(0, 2.5, 0); bigPyramid.rotation.y = Math.PI / 4;
  bigPyramid.castShadow = true; pyramidGroup.add(bigPyramid);

  // Medium pyramid
  const medPyramid = new THREE.Mesh(new THREE.ConeGeometry(2.2, 3.5, 4), darkSandMat);
  medPyramid.position.set(4, 1.75, -1.5); medPyramid.rotation.y = Math.PI / 4;
  medPyramid.castShadow = true; pyramidGroup.add(medPyramid);

  // Small pyramid
  const smPyramid = new THREE.Mesh(new THREE.ConeGeometry(1.2, 2, 4), sandMat);
  smPyramid.position.set(-2.5, 1, 2); smPyramid.rotation.y = Math.PI / 4;
  smPyramid.castShadow = true; pyramidGroup.add(smPyramid);

  pyramidGroup.position.set(-HALF - 10, 0, 3);
  addEnvGroup(pyramidGroup);

  // SPHINX — simplified
  const sphinxGroup = new THREE.Group();
  const sphinxMat = new THREE.MeshStandardMaterial({ color: 0xCCA858, roughness: 0.85 });
  // Body
  const sphinxBody = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 1.0), sphinxMat);
  sphinxBody.position.y = 0.4; sphinxGroup.add(sphinxBody);
  // Head
  const sphinxHead = new THREE.Mesh(new THREE.SphereGeometry(0.45, 10, 8), sphinxMat);
  sphinxHead.position.set(1.0, 1.0, 0); sphinxGroup.add(sphinxHead);
  // Front paws
  for (const side of [-0.3, 0.3]) {
    const paw = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.25), sphinxMat);
    paw.position.set(1.3, 0.15, side); sphinxGroup.add(paw);
  }
  sphinxGroup.position.set(HALF + 6, 0, -3);
  sphinxGroup.rotation.y = -Math.PI / 3;
  addEnvGroup(sphinxGroup);

  // OASIS — small green area with palm + water
  const oasisGroup = new THREE.Group();
  const water = new THREE.Mesh(
    new THREE.CircleGeometry(1.5, 16),
    new THREE.MeshStandardMaterial({ color: 0x2288cc, transparent: true, opacity: 0.6, roughness: 0.05 })
  );
  water.rotation.x = -Math.PI / 2; water.position.y = 0.02; oasisGroup.add(water);
  const oasisGrass = new THREE.Mesh(
    new THREE.CircleGeometry(2.2, 16),
    new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.8 })
  );
  oasisGrass.rotation.x = -Math.PI / 2; oasisGrass.position.y = 0.01; oasisGroup.add(oasisGrass);
  // Palm tree at oasis
  const oasisTrunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.07, 0.1, 1.8, 6),
    new THREE.MeshStandardMaterial({ color: theme.trunkColor })
  );
  oasisTrunk.position.set(0.5, 0.9, 0); oasisGroup.add(oasisTrunk);
  for (let j = 0; j < 5; j++) {
    const frond = new THREE.Mesh(
      new THREE.SphereGeometry(0.35, 6, 4),
      new THREE.MeshStandardMaterial({ color: 0x2a8030, roughness: 0.6 })
    );
    frond.scale.set(1.5, 0.3, 0.5);
    frond.position.set(0.5, 1.9, 0);
    frond.rotation.y = (j / 5) * Math.PI * 2;
    frond.rotation.z = -0.3;
    oasisGroup.add(frond);
  }
  oasisGroup.position.set(HALF + 5, 0, HALF + 5);
  addEnvGroup(oasisGroup);
}

// ===== FENCE BUILDER (shared) =====
function buildFence(theme) {
  const fenceMat = new THREE.MeshStandardMaterial({ color: theme.fenceColor, roughness: 0.8 });
  const railMat = new THREE.MeshStandardMaterial({ color: theme.railColor, roughness: 0.75 });
  const fencePostGeo = new THREE.BoxGeometry(0.2, 0.7, 0.2);
  const fenceRailGeo = new THREE.BoxGeometry(1, 0.1, 0.12);

  for (let i = 0; i <= COLS; i++) {
    const p = i - HALF;
    for (const [x, z] of [[p, -HALF - 0.3], [p, HALF + 0.3], [-HALF - 0.3, p], [HALF + 0.3, p]]) {
      const post = addEnv(new THREE.Mesh(fencePostGeo, fenceMat));
      post.position.set(x, 0.35, z); post.castShadow = true;
    }
  }
  for (let i = 0; i < COLS; i++) {
    const p = i - HALF + 0.5;
    for (const h of [0.25, 0.55]) {
      for (const [fx, fz, ry] of [
        [p, -HALF - 0.3, 0], [p, HALF + 0.3, 0],
        [-HALF - 0.3, p, Math.PI/2], [HALF + 0.3, p, Math.PI/2]
      ]) {
        const rail = addEnv(new THREE.Mesh(fenceRailGeo, railMat));
        rail.position.set(fx, h, fz); rail.rotation.y = ry;
      }
    }
  }
}

function buildEnvironment(mapId) {

  // Update scene colors
  scene.background = new THREE.Color(theme.skyColor);
  scene.fog = new THREE.Fog(theme.fogColor, theme.fogNear, theme.fogFar);
  renderer.setClearColor(theme.skyColor);
  document.body.style.background = '#' + new THREE.Color(theme.skyColor).getHexString();

  // Update lighting for mood
  if (mapId === 'winter') {
    ambientLight.color.set(0xd8e0f0); ambientLight.intensity = 0.85;
    dirLight.color.set(0xe8eeff); dirLight.intensity = 1.0;

    ambientLight.color.set(0xc8e8c0); ambientLight.intensity = 0.6;

const snakeMeshes = [];
let headGroup = null;

function gridToWorld(gx, gy) {
  return { x: (gx - HALF + 0.5) * CELL, z: (gy - HALF + 0.5) * CELL };
}

function createHeadGroup() {
  const group = new THREE.Group();
  const head = new THREE.Mesh(bodyGeo, bodyMat);
  head.castShadow = true;
  head.scale.set(1.1, 0.8, 1.1);
  group.add(head);
  for (const side of [-1, 1]) {
    const ew = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
    ew.position.set(side * 0.17, 0.32, -0.12);
    group.add(ew);
    const ep = new THREE.Mesh(eyePupilGeo, eyePupilMat);
    ep.position.set(side * 0.17, 0.32, -0.27);
    group.add(ep);
  }
  scene.add(group);
  return group;
}

function getBodyMesh(poolIdx) {
  if (poolIdx < snakeMeshes.length) { snakeMeshes[poolIdx].visible = true; return snakeMeshes[poolIdx]; }
  const mesh = new THREE.Mesh(bodyGeo, bodyMat.clone());
  mesh.castShadow = true; mesh.receiveShadow = true;
  scene.add(mesh); snakeMeshes.push(mesh); return mesh;
}

// ===== GAME STATE =====
let snake, dir, nextDir, food, foodType, score, running, gameOver, speed;
let runCoins, runFoodCounts, runStartTime, runMaxLength, runFoodTotal, extraLivesLeft;
let lastTickTime = 0;

// Input queue — stores up to 3 buffered directions to prevent missed inputs
let inputQueue = [];
const MAX_INPUT_QUEUE = 3;

// Smooth movement: store previous positions for lerp
let prevSnake = [];
let tickProgress = 1;

function getStartSpeed() { return 120 + upgradeLevels.speed * 15; }
function getCoinBonus() { return upgradeLevels.magnet; }
function getScoreMult() { return 1 + upgradeLevels.mult * 0.5; }

function init() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  prevSnake = snake.map(s => ({ ...s }));
  tickProgress = 1;
  dir = { x: 1, y: 0 };
  nextDir = { x: 0, y: 0 };
  inputQueue = [];
  score = 0; running = false; gameOver = false;
  speed = getStartSpeed(); lastTickTime = 0;
  runCoins = 0; runFoodCounts = {};
  FOOD_TYPES.forEach(ft => runFoodCounts[ft.name] = 0);
  runFoodTotal = 0; runMaxLength = snake.length;
  runStartTime = null; extraLivesLeft = upgradeLevels.life;
  lastFoodTypeIndex = -1;
  updateHUD();
  msgEl.textContent = 'Press any arrow key to start';
  gameoverOverlay.classList.remove('visible');
  // Show menu UI again
  document.getElementById('map-badge').style.display = '';
  document.getElementById('cheat-bar').style.display = '';
  placeFood(); syncScene();
}

function placeFood() {
  while (true) {
    food = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    if (!snake.some(s => s.x === food.x && s.y === food.y)) break;
  }
  foodType = pickFoodType(); createFoodMesh(foodType);
}

function updateHUD() {
  scoreEl.textContent = '🏆 ' + score;
  coinsEl.textContent = '🪙 +' + runCoins;
  walletEl.textContent = '🏦 $' + wallet;
  renderUpgradeBadges();
}

function renderUpgradeBadges() {
  upgradesBar.innerHTML = '';
  for (const def of UPGRADE_DEFS) {
    const lvl = upgradeLevels[def.id];
    if (lvl > 0) {
      const b = document.createElement('span'); b.className = 'upgrade-badge';
      b.textContent = def.id === 'life' ? `${def.icon} ${extraLivesLeft > 0 ? '❤️' : '💔'}` : `${def.icon} Lv${lvl}`;
      upgradesBar.appendChild(b);
    }
  }
}

function spawnFloatingText(text, color, worldPos) {
  const v = new THREE.Vector3(worldPos.x, 1, worldPos.z);
  v.project(fpvMode ? fpvCamera : camera);
  const x = (v.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-v.y * 0.5 + 0.5) * window.innerHeight;
  const el = document.createElement('div');
  el.className = 'float-text'; el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.color = color;
  el.textContent = text; document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function handleDeath() {
  gameOver = true; running = false;
  const runTime = runStartTime ? ((Date.now() - runStartTime) / 1000) : 0;
  wallet += runCoins; updateHUD(); showGameOver(runTime);
}

function gameTick() {
  // Consume next direction from the input queue
  while (inputQueue.length > 0) {
    const nd = inputQueue.shift();
    if (nd.x !== 0 || nd.y !== 0) {
      if (!(dir.x + nd.x === 0 && dir.y + nd.y === 0)) {
        dir = { ...nd };
        break;
      }
    }
  }
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  const coll = head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
    snake.some(s => s.x === head.x && s.y === head.y);
  if (coll) {
    if (extraLivesLeft > 0) {
      extraLivesLeft--; renderUpgradeBadges();
      spawnFloatingText('💔 Saved!', '#ff6b6b', gridToWorld(snake[0].x, snake[0].y));
      return;
    }
    handleDeath(); return;
  }

  // Save previous positions for smooth interpolation
  prevSnake = snake.map(s => ({ ...s }));
  tickProgress = 0;

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    const ft = foodType;
    const cg = ft.coins + getCoinBonus(), sg = Math.round(ft.score * getScoreMult());
    score += sg; runCoins += cg; runFoodCounts[ft.name]++; runFoodTotal++;
    runMaxLength = Math.max(runMaxLength, snake.length);
    spawnFloatingText(`${ft.emoji} +${sg}  🪙${cg}`, '#fff', gridToWorld(head.x, head.y));
    placeFood(); if (speed > 60) speed -= 2;
    prevSnake.push({ ...prevSnake[prevSnake.length - 1] });
  } else { snake.pop(); }
  updateHUD();
}

// ===== CAMERA =====
let fpvMode = false;
const fpvCamera = new THREE.PerspectiveCamera(100, window.innerWidth / window.innerHeight, 0.05, 150);
const camBtn = document.getElementById('cam-btn');

function toggleCamera() {
  fpvMode = !fpvMode;
  camBtn.textContent = fpvMode ? '🐍 Snake Eyes (C)' : '📷 Orbit (C)';
  orbitControls.enabled = !fpvMode;
}
camBtn.addEventListener('click', toggleCamera);

function getHeadDir3D() { return { dx: dir.x, dz: dir.y }; }

// Lerp a grid position between prev and current
function lerpGridPos(i, t) {
  const cur = gridToWorld(snake[i].x, snake[i].y);
  if (i >= prevSnake.length || t >= 1) return cur;
  const prev = gridToWorld(prevSnake[i].x, prevSnake[i].y);
  return {
    x: prev.x + (cur.x - prev.x) * t,
    z: prev.z + (cur.z - prev.z) * t
  };
}

function updateFPVCamera() {
  if (!fpvMode || snake.length < 1) return;
  // In retro mode, snap (no lerp)
  const t = pixelMode ? 1 : tickProgress;
  const hp = lerpGridPos(0, t);
  const d = getHeadDir3D();
  fpvCamera.position.set(
    hp.x + d.dx * 0.3,
    CELL * 0.55,
    hp.z + d.dz * 0.3
  );
  fpvCamera.lookAt(
    hp.x + d.dx * 20,
    CELL * 0.25,
    hp.z + d.dz * 20
  );
}

function syncScene() {
  const total = snake.length;
  // In retro mode, snap to grid (t=1 means current position, no lerp)
  const t = pixelMode ? 1 : tickProgress;

  // Head
  if (total > 0) {
    if (!headGroup) headGroup = createHeadGroup();
    headGroup.visible = !fpvMode;
    const hp = lerpGridPos(0, t);
    headGroup.position.set(hp.x, CELL * 0.3, hp.z);
    const d = getHeadDir3D();
    headGroup.rotation.y = Math.atan2(d.dx, d.dz) + Math.PI;
    // Update head color from skin
    const headElapsed = clock ? clock.getElapsedTime() : 0;
    const headCol = getSkinColor(0, total, headElapsed);
    headGroup.children[0].material.color.copy(headCol);
  }

  // Body segments — smoothly interpolated (or snapped in retro)
  const elapsedTime = clock ? clock.getElapsedTime() : 0;
  for (let i = 1; i < total; i++) {
    const mesh = getBodyMesh(i - 1);
    const pos = lerpGridPos(i, t);
    mesh.position.set(pos.x, CELL * 0.3, pos.z);
    const skinCol = getSkinColor(i, total, elapsedTime);
    mesh.material.color.copy(skinCol);
    const skinProps = getSkinProps();
    mesh.material.metalness = skinProps.metalness;
    mesh.material.emissive.set(skinProps.emissive);
    mesh.material.emissiveIntensity = skinProps.emissiveIntensity;
    mesh.scale.set(1.05, 0.72, 1.05);
  }
  for (let i = Math.max(total - 1, 0); i < snakeMeshes.length; i++) snakeMeshes[i].visible = false;
  if (headGroup && total === 0) headGroup.visible = false;

  if (foodGroup) {
    const fp = gridToWorld(food.x, food.y);
    foodGroup.position.set(fp.x, CELL * 0.4, fp.z);
  }
  updateFPVCamera();
}

    btn.disabled = currentSkin === skin.id;
    btn.addEventListener('click', () => {
      currentSkin = skin.id;
      updateSnakeMaterials();
      renderSkinShop();
    });
    card.appendChild(btn);
    freeGrid.appendChild(card);
  }
  skinShopContent.appendChild(freeGrid);

  // Paid skins section
  const paidTitle = document.createElement('div');
  paidTitle.className = 'skin-section-title';
  paidTitle.textContent = '💎 Premium Skins';
  skinShopContent.appendChild(paidTitle);

  const paidGrid = document.createElement('div');
  paidGrid.className = 'skin-grid';
  for (const skin of paidSkins) {
    const card = document.createElement('div');
    card.className = 'skin-card' + (currentSkin === skin.id ? ' selected' : '');
    // Preview gradient or color
    let previewStyle;
    const paidSkinImg = createSkinPreviewDataURL(skin);
    card.innerHTML = `<img src="${paidSkinImg}" style="width:100%;height:24px;border-radius:12px;margin:4px 0;"><h3>${skin.name}</h3>` +
      (skin.desc ? `<div style="font-size:10px;color:#8d6e3f;margin-bottom:4px;">${skin.desc}</div>` : '');
    const btn = document.createElement('button');
    btn.className = 'map-buy-btn' + (currentSkin === skin.id ? ' selected-btn' : '');
    if (currentSkin === skin.id) {
      btn.textContent = 'SELECTED'; btn.disabled = true;
    } else if (skin.owned) {
      btn.textContent = 'Select';
      btn.addEventListener('click', () => {
        currentSkin = skin.id;
        updateSnakeMaterials();
        renderSkinShop();
      });
    } else {
      const canAfford = wallet >= skin.cost;
      btn.textContent = `Buy — $${skin.cost}`; btn.disabled = !canAfford;
      btn.addEventListener('click', () => {
        if (wallet >= skin.cost) {
          wallet -= skin.cost; skin.owned = true;
          currentSkin = skin.id;
          updateSnakeMaterials();
          renderSkinShop();
          updateHUD();
        }
      });
    }
    card.appendChild(btn);
    // Watch Ad button for locked paid skins
    if (!skin.owned) {
      const adBtn = document.createElement('button');
      adBtn.className = 'watch-ad-btn';
      adBtn.textContent = '▶ Watch Ad';
      adBtn.addEventListener('click', () => {
        showRewardedAd(() => {
          skin.owned = true;
          currentSkin = skin.id;
          updateSnakeMaterials();
          renderSkinShop();
          updateHUD();
        });
      });
      card.appendChild(adBtn);
    }
    paidGrid.appendChild(card);
  }
  skinShopContent.appendChild(paidGrid);
}

document.getElementById('btn-play-again').addEventListener('click', () => init());
document.getElementById('btn-open-shop').addEventListener('click', () => openShop());
document.getElementById('btn-open-maps-go').addEventListener('click', () => openMapShop());
document.getElementById('btn-open-skins-go').addEventListener('click', () => openSkinShop());
document.getElementById('shop-close').addEventListener('click', () => closeShop());
document.getElementById('mapshop-close').addEventListener('click', () => closeMapShop());
document.getElementById('skinshop-close').addEventListener('click', () => closeSkinShop());
document.getElementById('map-btn').addEventListener('click', () => {
  if (!running || gameOver) openMapShop();
});
document.getElementById('skin-btn').addEventListener('click', () => {
  if (!running || gameOver) openSkinShop();
});

// ===== INPUT =====
const ABS_DIRS = {
  ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
  w:{x:0,y:-1}, W:{x:0,y:-1}, s:{x:0,y:1}, S:{x:0,y:1},
  a:{x:-1,y:0}, A:{x:-1,y:0}, d:{x:1,y:0}, D:{x:1,y:0},
};

function getFPVRelativeDir(key) {
  const dx = dir.x, dy = dir.y;
  if (key === 'ArrowUp')    return { x: dx, y: dy };
  if (key === 'ArrowLeft')  return { x: dy, y: -dx };
  if (key === 'ArrowRight') return { x: -dy, y: dx };
  return { x: -dx, y: -dy };
}

// Map WASD to arrow equivalents for FPV relative dir lookup
function normalizeKey(key) {
  const map = { w:'ArrowUp', W:'ArrowUp', s:'ArrowDown', S:'ArrowDown', a:'ArrowLeft', A:'ArrowLeft', d:'ArrowRight', D:'ArrowRight' };
  return map[key] || key;
}

document.addEventListener('keydown', e => {
  const key = e.key;
  // Only handle shortcuts if not a movement key
  if (!ABS_DIRS[key]) {
    if (key === 'c' || key === 'C') { toggleCamera(); return; }
    if (key === 'p' || key === 'P') { togglePixelMode(); return; }
    if (key === 'm' || key === 'M') { if (!running || gameOver) openMapShop(); return; }
    if (key === 'k' || key === 'K') { if (!running || gameOver) openSkinShop(); return; }
    if (key === 'r' || key === 'R') { shopOverlay.classList.remove('visible'); mapShopOverlay.classList.remove('visible'); skinShopOverlay.classList.remove('visible'); init(); return; }
    if (key === 'Escape') {
      if (skinShopOverlay.classList.contains('visible')) { closeSkinShop(); return; }
      if (mapShopOverlay.classList.contains('visible')) { closeMapShop(); return; }
      if (shopOverlay.classList.contains('visible')) { closeShop(); return; }
    }
    return;
  }

  e.preventDefault();
  if (shopOverlay.classList.contains('visible') || gameoverOverlay.classList.contains('visible') || mapShopOverlay.classList.contains('visible') || skinShopOverlay.classList.contains('visible')) return;

  const normKey = normalizeKey(key);
  let nd;
  if (fpvMode) {
    nd = getFPVRelativeDir(normKey);
  } else {
    nd = ABS_DIRS[key];
  }

  // Check reversal against the effective current direction
  // (last queued dir, or actual dir if queue is empty)
  const effDir = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : dir;
  if (running && effDir.x + nd.x === 0 && effDir.y + nd.y === 0) return;

  if (!running && !gameOver) {
    const testHead = { x: snake[0].x + nd.x, y: snake[0].y + nd.y };
    const wouldCollide = testHead.x < 0 || testHead.x >= COLS || testHead.y < 0 || testHead.y >= ROWS ||
      snake.some(s => s.x === testHead.x && s.y === testHead.y);
    if (wouldCollide) return;

    running = true;
    dir = { ...nd };
    inputQueue = [];
    runStartTime = Date.now();
    lastTickTime = performance.now();
    msgEl.textContent = '';
    // Hide menu UI during gameplay (keep cam-indicator visible)
    document.getElementById('map-badge').style.display = 'none';
    document.getElementById('cheat-bar').style.display = 'none';
    syncScene();
    return;
  }

  // If queue is empty, also apply direction immediately for visual feedback
  // This makes the head rotate instantly and the next tick uses the new dir
  if (inputQueue.length === 0 && !(dir.x + nd.x === 0 && dir.y + nd.y === 0)) {
    dir = { ...nd };
    syncScene(); // immediate visual rotation
  }

  // Buffer the input (max 3 queued turns)
  if (inputQueue.length < MAX_INPUT_QUEUE) {
    inputQueue.push(nd);
  }
});

// ===== CHEAT CODES =====
const cheatInput = document.getElementById('cheat-input');
const cheatMsg = document.getElementById('cheat-msg');

// Prevent cheat input from triggering game controls
cheatInput.addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === 'Enter') {
    const code = cheatInput.value.trim().toLowerCase();
    cheatInput.value = '';
    let success = false;
    if (code === 'money') {
      wallet += 10000;
      walletEl.textContent = wallet;
      cheatMsg.textContent = '+10,000 coins!';
      success = true;
    } else if (code === 'skins') {
      SKIN_DEFS.forEach(s => s.owned = true);
      cheatMsg.textContent = 'All skins unlocked!';
      success = true;
    } else if (code === 'maps') {
      MAP_DEFS.forEach(m => m.owned = true);
      cheatMsg.textContent = 'All maps unlocked!';
      success = true;
    } else if (code === 'hack') {
      wallet = 999999;
      walletEl.textContent = wallet;
      SKIN_DEFS.forEach(s => s.owned = true);
      MAP_DEFS.forEach(m => m.owned = true);
      cheatMsg.textContent = 'HACKED! Everything unlocked!';
      success = true;
    } else {
      cheatMsg.textContent = 'Invalid code';
    }
    cheatMsg.className = success ? 'cheat-success' : 'cheat-fail';
    setTimeout(() => { cheatMsg.textContent = ''; cheatMsg.className = ''; }, 2500);
  }
});

// ===== ANIMATION =====
const clock = new THREE.Clock();

function animate(now) {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (running && !gameOver && now - lastTickTime >= speed) {
    lastTickTime = now;
    gameTick();
  }

  if (running && !gameOver && speed > 0) {
    tickProgress = Math.min((now - lastTickTime) / speed, 1);
  }
  syncScene();

  if (foodGroup) {
    foodGroup.position.y = CELL * 0.4 + Math.sin(t * 3) * 0.15;
    foodGroup.rotation.y = t * 2;
  }

  if (pixelMode) {
    updateFPVCamera();
    const activeCam = fpvMode ? fpvCamera : camera;
    if (!fpvMode) orbitControls.update();
    renderer.setRenderTarget(retroTarget);
    renderer.render(scene, activeCam);
    renderer.setRenderTarget(null);
    retroQuadMat.map = retroTarget.texture;
    renderer.render(retroScene, retroCam);
  } else {
    if (fpvMode) {
      updateFPVCamera();
      renderer.render(scene, fpvCamera);
    } else {
      orbitControls.update();
      renderer.render(scene, camera);
    }
  }
}

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  const a = w / h;
  camera.aspect = a; camera.updateProjectionMatrix();
  fpvCamera.aspect = a; fpvCamera.updateProjectionMatrix();
  renderer.setSize(w, h);
  retroTarget.setSize(Math.floor(w / RETRO_SCALE), Math.floor(h / RETRO_SCALE));
});

buildEnvironment(currentMap);
init();
requestAnimationFrame(animate);
</script>
